[package]
name = "smarthistory"
version = "1.0.0"
edition = "2024"

[dependencies]
anyhow = "1.0.102"
arboard = "3"
chrono = "0.4.44"
clap = { version = "4.6.1", features = ["derive"] }
crossterm = { version = "0.29.0", features = ["use-dev-tty"] }
ratatui = "0.30.0"
ratatui-themes = "0.2"
regex = "1.10"
rusqlite = "0.31.0"
serde_json = "1"
ureq = { version = "2", features = ["json"] }
